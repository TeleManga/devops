name: Add joke to PR

on:
  pull_request:
    types: [opened, synchronize]
  workflow_call:
    secrets:
      github-token:
        description: 'GitHub token for posting PR comments'
        required: false

jobs:
  joke:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests "g4f[all]"

      - name: Get diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff origin/${{ github.base_ref }} HEAD > changes.txt

      - name: Generate and post joke
        env:
          GITHUB_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'SCRIPT'
          import os
          import requests
          import g4f

          pr_number = os.getenv("PR_NUMBER")
          token = os.getenv("GITHUB_TOKEN")
          repo = os.getenv("GITHUB_REPOSITORY")

          with open("changes.txt", "r") as f:
              diff = f.read()

          def generate_joke(topic):
              return g4f.ChatCompletion.create(
                  model=g4f.models.default,
                  provider=g4f.models.Yqcloud,
                  messages=[{
                      "role": "user",
                      "content": (
                          "Ты ревьювер для merge request в github. "
                          "Напиши анекдот на самое смешное изменение в коде, "
                          "а потом напиши что все таки стоит сделать для нормального кода "
                          "(обычное ревью, не будь слишком критичен). "
                          "Пиши в синтаксисе markdown. "
                          f"Для ревью пришли следующие изменения: {topic}"
                      ),
                  }],
              )

          def post_comment(pr_number, body):
              url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github.v3+json",
              }
              resp = requests.post(url, json={"body": body}, headers=headers)
              if resp.status_code == 201:
                  print("Comment posted successfully")
              else:
                  print(f"Failed to post comment: {resp.status_code}")
                  print(resp.text)

          joke = generate_joke(diff)
          print(joke)
          post_comment(pr_number, joke)
          SCRIPT
